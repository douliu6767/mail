<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>逗留邮箱管理平台</title>
    <link rel="stylesheet" href="style.css">
    <style>
    body { margin:0; padding:0; font-family:"Microsoft YaHei",Arial,sans-serif;}
    .container { display: flex; height: 100vh; }
    .sidebar {
        width: 220px;
        background: #fff;
        border-right: 1px solid #e5e5e5;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
    }
    .sidebar-title {
        color: #f00;
        font-size: 22px;
        margin: 12px 0 30px 10px;
        font-weight: bold;
        letter-spacing: 2px;
    }
    .sidebar-menu {
        width: 100%;
        flex: 1;
    }
    .sidebar-menu-item {
        width: 100%;
        text-align: left;
        font-size: 32px;
        color: #222;
        padding: 18px 0 18px 24px;
        cursor: pointer;
        border-bottom: 1px solid #eee;
        transition: background 0.2s, color 0.2s;
    }
    .sidebar-menu-item.active {
        background: #f8f8f8;
        color: #e00;
        font-weight: bold;
    }
    .main {
        flex: 1;
        padding: 40px 40px;
        background: #fff;
        overflow-y: auto;
    }
    .section {
        display: none;
    }
    .section.active {
        display: block;
    }
    #msg { color: #e00; margin: 10px 0;}
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <div class="sidebar-title">逗留邮箱管理平台</div>
        <div class="sidebar-menu">
            <div class="sidebar-menu-item active" onclick="showSection('home')">首页</div>
            <div class="sidebar-menu-item" onclick="showSection('mail')">邮箱管理</div>
            <div class="sidebar-menu-item" onclick="showSection('card')">卡密管理</div>
            <div class="sidebar-menu-item" onclick="showSection('proxy')">代理池</div>
            <div class="sidebar-menu-item" onclick="showSection('mail-log')">收件日志</div>
            <div class="sidebar-menu-item" onclick="showSection('card-log')">卡密日志</div>
            <div class="sidebar-menu-item" onclick="showSection('system')">系统设置</div>
        </div>
    </div>
    <div class="main">
        <!-- 首页 -->
        <div class="section active" id="section-home">
            <h2>欢迎使用逗留邮箱管理平台</h2>
            <p>请从左侧菜单选择功能。</p>
        </div>
        <!-- 邮箱管理 -->
        <div class="section" id="section-mail">
            <h2>邮箱管理</h2>
            <form id="addMailForm">
                <label>邮箱地址:</label><input type="email" name="email" required><br>
                <label>IMAP服务器:</label><input type="text" name="imap_host" required><br>
                <label>IMAP端口:</label><input type="number" name="imap_port" value="993"><br>
                <label>用户名:</label><input type="text" name="username" required><br>
                <label>密码:</label><input type="password" name="password" required><br>
                <button type="submit">添加邮箱</button>
            </form>
            <h3>已添加邮箱</h3>
            <ul id="accountList"></ul>
        </div>
        <!-- 卡密管理 -->
        <div class="section" id="section-card">
            <h2>卡密管理</h2>
            <p>（功能待开发）</p>
        </div>
        <!-- 代理池 -->
        <div class="section" id="section-proxy">
            <h2>代理池</h2>
            <p>（功能待开发）</p>
        </div>
        <!-- 收件日志 -->
        <div class="section" id="section-mail-log">
            <h2>收件日志</h2>
            <p>（功能待开发）</p>
        </div>
        <!-- 卡密日志 -->
        <div class="section" id="section-card-log">
            <h2>卡密日志</h2>
            <p>（功能待开发）</p>
        </div>
        <!-- 系统设置（管理员账号密码修改） -->
        <div class="section" id="section-system">
            <h2>系统设置</h2>
            <form id="changeAdminForm">
                <label>新账号:</label><input type="text" name="username" required><br>
                <button type="submit">修改账号</button>
            </form>
            <form id="changePwdForm">
                <label>新密码:</label><input type="password" name="password" required><br>
                <button type="submit">修改密码</button>
            </form>
            <button onclick="logout()">退出登录</button>
        </div>
        <p id="msg"></p>
    </div>
</div>
<!-- 登录弹窗 -->
<div id="loginModal" style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(255,255,255,0.92);display:flex;align-items:center;justify-content:center;z-index:9;">
    <form id="loginForm" style="background:#fff;border-radius:8px;box-shadow:0 0 20px #eee;padding:40px 60px;">
        <h2 style="color:#e00;text-align:center;">管理员登录</h2>
        <label>账号:</label><input type="text" name="username" required><br>
        <label>密码:</label><input type="password" name="password" required><br>
        <button type="submit" style="width:100%;margin-top:20px;">登录</button>
        <div id="loginMsg" style="color:#e00;margin-top:10px;text-align:center;"></div>
    </form>
</div>
<script>
function showSection(type){
    document.querySelectorAll('.sidebar-menu-item').forEach((el)=>{
        el.classList.remove('active');
    });
    document.querySelectorAll('.sidebar-menu-item').forEach((el)=>{
        if(el.textContent.trim()===document.querySelector('[id="section-'+type+'"]').querySelector('h2').textContent.trim()){
            el.classList.add('active');
        }
    });
    document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));
    document.getElementById('section-'+type).classList.add('active');
    document.getElementById('msg').textContent = "";
    if(type==="mail") loadAccounts();
}
function showLogin(){
    document.getElementById("loginModal").style.display="";
}
function hideLogin(){
    document.getElementById("loginModal").style.display="none";
}
document.getElementById('loginForm').onsubmit = function(e){
    e.preventDefault();
    fetch('api.php?action=login', {
        method: 'POST',
        body: JSON.stringify({
            username: this.username.value,
            password: this.password.value
        })
    }).then(res => res.json()).then(data => {
        if(data.success){
            hideLogin();
            showSection('home');
            loadAccounts();
        }else{
            document.getElementById('loginMsg').textContent=data.msg;
        }
    });
};
function logout(){
    fetch('api.php?action=logout').then(()=>{location.reload();});
}

// 修改账号
document.getElementById('changeAdminForm').onsubmit = function(e){
    e.preventDefault();
    fetch('api.php?action=change_admin', {
        method: 'POST',
        body: JSON.stringify({username: this.username.value})
    }).then(res => res.json()).then(data => {
        document.getElementById('msg').textContent=data.success?'账号修改成功':'账号修改失败';
    });
};

// 修改密码
document.getElementById('changePwdForm').onsubmit = function(e){
    e.preventDefault();
    fetch('api.php?action=change_password', {
        method: 'POST',
        body: JSON.stringify({password: this.password.value})
    }).then(res => res.json()).then(data => {
        document.getElementById('msg').textContent=data.success?'密码修改成功':'密码修改失败';
    });
};

// 添加邮箱
document.getElementById('addMailForm').onsubmit = function(e){
    e.preventDefault();
    let form = this;
    fetch('api.php?action=add_account', {
        method: 'POST',
        body: JSON.stringify({
            email: form.email.value,
            imap_host: form.imap_host.value,
            imap_port: form.imap_port.value,
            username: form.username.value,
            password: form.password.value
        })
    }).then(res => res.json()).then(data => {
        document.getElementById('msg').textContent=data.success?'邮箱添加成功':(data.msg||'邮箱添加失败');
        loadAccounts();
    });
};

// 刷新邮箱列表
function loadAccounts(){
    fetch('api.php?action=list_accounts').then(res=>res.json()).then(data=>{
        let ul = document.getElementById('accountList'); ul.innerHTML='';
        (data.data||[]).forEach(acc=>{
            let li = document.createElement('li');
            li.textContent = acc.email+' ('+acc.imap_host+')';
            ul.appendChild(li);
        });
    });
}

// 首次加载弹窗登录
window.onload = function(){
    showLogin();
};
</script>
</body>
</html>
